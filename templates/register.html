{% extends "base.html" %}

{% block title %}Registracija | Budi Blendz{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="card auth-card">
        <h2>Registracija</h2>
        <p class="auth-subtext">Ustvari račun za rezervacijo termina.</p>

        <form method="POST" class="auth-form">
            <label for="name">Ime</label>
            <input id="name" name="name" type="text" placeholder="Vnesi ime" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Vnesi email" required>

            <label for="password">Geslo</label>
            <input id="password" name="password" type="password" placeholder="Vsaj 6 znakov" required>

            <label for="phone">Telefon</label>
            <input id="phone" name="phone" type="text" placeholder="Vnesi telefonsko številko" required>
            
            <button type="submit" class="btn">Registracija</button>
        </form>

        <p class="auth-switch">
            Že imaš račun?
            <a href="/login">Prijavi se</a>
        </p>
    </div>
</section>
{% endblock %}
